<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up Page</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="login-box">
      <h1>Create Account</h1>
      <p>Enter your details to sign up</p>

      <form action="#" method="post">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="your username" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" minlength="8" required />

        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" minlength="8" required />

        <button type="submit">Sign Up</button>
      </form>

      <p class="signup">Already have an account? <a href="index.html">Login</a></p>
    </div>
  </div>

  <script>
    const form = document.querySelector('form');
    form.addEventListener('submit', (event) => {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      if (password !== confirmPassword) {
        event.preventDefault();
        alert('Passwords do not match. Please re-enter.');
      }
    });
  </script>
</body>
</html>
